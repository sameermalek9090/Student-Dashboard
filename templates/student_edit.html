{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Edit Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .modal-card {
            max-width: 700px;
            margin: 80px auto;
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .15);
        }

        .btn-save {
            background: #4f46e5;
            color: white;
            border-radius: 10px;
            padding: 10px 22px;
        }
    </style>
</head>

<body>

    <div class="modal-card">
        <h5 class="mb-4">Edit Payment Details</h5>

        <form method="POST">
            {% csrf_token %}

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Student Name</label>
                    <input type="text" class="form-control" value="{{ s.FNAME }} {{ s.LNAME }}" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control" value="{{ s.PHONE }}" disabled>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Course</label>
                    <input type="text" name="course" class="form-control" value="{{ s.course }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Total Fees</label>
                    <input type="number" name="total_fees" class="form-control" value="{{ s.total_fees }}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Paid Amount</label>
                    <input type="number" class="form-control" value="{{ s.paid_fees }}" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Add Installment Amount</label>
                    <input type="number" name="installment" class="form-control"
                        placeholder="Enter installment (optional)">
                </div>
            </div>
            <hr>

            <h5 class="mt-4">Generate Letters</h5>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="joining_letter" value="1">
                <label class="form-check-label">Joining Letter</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="offer_letter" value="1">
                <label class="form-check-label">Offer Letter</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="definition_letter" value="1">
                <label class="form-check-label">Definition Letter</label>
            </div>
            <div class="d-flex justify-content-end gap-2 mt-4">
                <a href="/JoiningStudents/" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-save">Save Changes</button>
            </div>
        </form>
        <hr class="mt-5">

        <h4 class="mt-4">Payment History</h4>

        {% if installments %}
        {% for inst in installments %}
        <div class="card mb-3 p-3 shadow-sm">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <strong>₹ {{ inst.amount }}</strong><br>
                    <small>{{ inst.payment_date }}</small>
                </div>

                <a href="{% url 'generate_receipt' s.id %}" class="btn btn-primary btn-sm">
                    Download Full Receipt
                </a>
            </div>
        </div>
        {% endfor %}
        {% else %}
        <p>No payments yet.</p>
        {% endif %}

    </div>

</body>

</html>

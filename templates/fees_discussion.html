{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Fees Discussion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            font-family: "Segoe UI", sans-serif;
        }

        .discussion-container {
            max-width: 650px;
            margin: 80px auto;
        }

        .discussion-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        }

        .discussion-card h3 {
            font-weight: 700;
            margin-bottom: 25px;
            color: #334155;
        }

        .student-info {
            background: #f1f5ff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-radius: 12px;
            font-weight: 600;
            padding: 10px;
        }

        .btn-confirm:hover {
            opacity: 0.9;
            color: white;
        }

        .back-link {
            text-decoration: none;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .discussion-container {
                margin: 20px auto;
                max-width: 100%;
            }
            .discussion-card {
                padding: 20px;
            }
            h3 {
                font-size: 24px;
            }
        }

        @media (max-width: 576px) {
            .discussion-card {
                padding: 15px;
            }
            .student-info {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="discussion-container">

        <div class="discussion-card">

            <h3>Fees Discussion</h3>

            <div class="student-info">
                <strong>Name:</strong> {{ student.FNAME }} {{ student.LNAME }} <br>
                <strong>Email:</strong> {{ student.EMAIL }} <br>
                <strong>Phone:</strong> {{ student.PHONE }}
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Select Course</label>
                    <select name="course" id="courseSelect" class="form-select" required>

                        <option value="">Choose Course</option>

                        {% for c in courses %}

                        <option value="{{ c.id }}" data-fees="{{ c.fees }}">
                            {{ c.name }} (₹ {{ c.fees }})
                        </option>

                        {% endfor %}

                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Total Fees</label>
                    <input type="text" id="totalFees" class="form-control" readonly>
                </div>

                <div class="mb-4">
                    <label class="form-label">Paid Amount</label>
                    <input type="number" name="paid_fees" class="form-control" placeholder="Enter paid amount">
                </div>

                <button type="submit" class="btn btn-confirm w-100">
                    Confirm & Move to Joining
                </button>

            </form>

            <div class="mt-3 text-center">
                <a href="/visiting/" class="back-link">← Back to Visiting</a>
            </div>

        </div>

    </div>

    <script>
        document.getElementById("courseSelect").addEventListener("change", function () {
            let fees = this.options[this.selectedIndex].getAttribute("data-fees");
            document.getElementById("totalFees").value = fees ? "₹ " + fees : "";
        });
    </script>

</body>

</html>

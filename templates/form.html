{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>

    <!-- REQUIRED FOR RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9
        }

        .card-box {
            max-width: 700px;
            background: white;
            padding: 25px;
            margin: auto;
            margin-top: 60px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, .08);
        }

        /* ===== GPay Style v2 ===== */

        .gpay2-modal {
            border-radius: 20px;
            padding: 35px 25px;
            border: none;
            background: #fff;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.4s ease;
        }

        .gpay2-ring {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: conic-gradient(#1aa260 0deg, #1aa260 360deg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            position: relative;
        }

        .gpay2-ring::before {
            content: "";
            position: absolute;
            width: 68px;
            height: 68px;
            background: #fff;
            border-radius: 50%;
        }

        .gpay2-ring span {
            position: relative;
            color: #1aa260;
            font-size: 34px;
            font-weight: bold;
        }

        .gpay2-btn {
            background: linear-gradient(135deg, #1a73e8, #4285f4);
            color: #fff;
            border-radius: 12px;
            padding: 10px 34px;
            font-size: 15px;
            border: none;
        }

        .gpay2-btn:hover {
            opacity: 0.9;
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ==========================
           RESPONSIVE FIXES ONLY
        ========================== */

        @media (max-width: 768px) {
            .card-box {
                max-width: 95%;
                margin-top: 30px;
                padding: 20px;
            }
        }

        @media (max-width: 576px) {
            .card-box {
                padding: 18px;
            }

            h3 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

    <div class="card-box">
        <div class="text-center">
            <img src="/static/images/logo.png" alt="">
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">First Name</label>
                    <input type="text" name="FNAME" class="form-control" placeholder="Your First Name" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="LNAME" class="form-control" placeholder="Your Last Name" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Birthday</label>
                    <input type="date" name="BIRTHDAY" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Gender</label>
                    <select class="form-select" name="GENDER" required>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="EMAIL" class="form-control" placeholder="Enter Your Email" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">PHONE</label>
                    <input type="tel" name="PHONE" class="form-control" placeholder="Enter 10-digit phone number"
                        pattern="[0-9]{10}" maxlength="10" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Address</label>
                    <input type="text" name="ADDRESS" class="form-control" placeholder="Enter Your Current Address">
                </div>

                <div class="col-md-6">
                    <label class="form-label">City</label>
                    <input type="text" name="CITY" class="form-control" placeholder="eg. Ahmedabad" required>
                </div>

                <div class="col-12">
                    <label class="form-label">College Name</label>
                    <input type="text" name="COLLEGENAME" class="form-control" placeholder="Your College Name" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Qualification</label>
                    <select class="form-select" name="QUALIFICATION" required>
                        <option disabled selected>Choose option</option>

                        {% for q in qualifications %}
                        <option value="{{ q.name }}">{{ q.name }}</option>
                        {% endfor %}

                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Branch</label>
                    <select name="BRANCH" class="form-select">
                        <option disabled selected>Choose option</option>

                        {% for b in branches %}
                        <option value="{{ b.name }}">{{ b.name }}</option>
                        {% endfor %}

                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Passing Year</label>
                    <select name="PASSING_YEAR" class="form-select">
                        <option>Choose</option>

                        {% for y in years %}
                        <option value="{{ y.year }}">{{ y.year }}</option>
                        {% endfor %}

                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Technology</label>
                    <select name="TECHNOLOGY" class="form-select">
                        <option>Choose</option>

                        {% for t in technologies %}
                        <option value="{{ t.name }}">{{ t.name }}</option>
                        {% endfor %}

                    </select>
                </div>

            </div>

            <button type="submit" class="btn btn-primary w-100 mt-5">Register</button>
        </form>

        {% if messages %}
        <div class="modal fade" id="successModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content gpay2-modal text-center">

                    <div class="gpay2-ring">
                        <span>✓</span>
                    </div>

                    {% for message in messages %}
                    <h5 class="mt-3 fw-semibold">{{ message }}</h5>
                    {% endfor %}

                    <p class="text-muted">Your data has been submitted</p>
                    <p class="text-muted">Admin will contact you shortly.</p>

                    <button class="btn gpay2-btn mt-3" data-bs-dismiss="modal">
                        Done
                    </button>

                </div>
            </div>
        </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% if messages %}
    <script>
        window.onload = function () {
            new bootstrap.Modal(
                document.getElementById("successModal")
            ).show();
        };
    </script>
    {% endif %}

</body>

</html>

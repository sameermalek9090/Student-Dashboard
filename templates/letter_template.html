<!DOCTYPE html>
<html>
<head>
    <title>Letter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .letter-box{
            max-width:800px;
            margin:auto;
            background:white;
            padding:60px;
            min-height:1000px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .logo{
            text-align:center;
            margin-bottom:40px;
        }
        h1{
            text-align:center;
            margin-bottom:50px;
        }
        .content{
            font-size:18px;
            line-height:32px;
            white-space:pre-line;
        }
        .sign{
            margin-top:80px;
        }
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .letter-box {
                padding: 30px;
                min-height: auto;
            }
            .content {
                font-size: 16px;
                line-height: 28px;
            }
        }
        @media print {
            body {
                background: white !important;
                padding: 0 !important;
            }
            .letter-box {
                box-shadow: none !important;
                padding: 40px !important;
            }
        }
    </style>
</head>
<body>

<div class="letter-box">
    <div class="logo">
        <h2>Way To Web Pvt Ltd.</h2>
    </div>

    <h1>Letter</h1>

    <div class="content">
        {{ content }}
    </div>

    <div class="sign">
        Authorized Signatory<br>
        Way To Web
    </div>
</div>

</body>
</html>

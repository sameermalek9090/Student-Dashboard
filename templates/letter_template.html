<!DOCTYPE html>
<html>
<head>
    <title>Letter</title>
    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
        }
        .letter-box{
            width:800px;
            margin:auto;
            background:white;
            padding:60px;
            min-height:1000px;
        }
        .logo{
            text-align:center;
            margin-bottom:40px;
        }
        h1{
            text-align:center;
            margin-bottom:50px;
        }
        .content{
            font-size:18px;
            line-height:32px;
            white-space:pre-line;
        }
        .sign{
            margin-top:80px;
        }
    </style>
</head>
<body>

<div class="letter-box">
    <div class="logo">
        <h2>Way To Web Pvt Ltd.</h2>
    </div>

    <h1>Letter</h1>

    <div class="content">
        {{ content }}
    </div>

    <div class="sign">
        Authorized Signatory<br>
        Way To Web
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
    <title>Payment History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8fafc;
            font-family: "Segoe UI", sans-serif;
        }

        .timeline {
            max-width: 800px;
            margin: 60px auto;
        }

        .timeline-item {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .receipt-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-radius: 8px;
            padding: 6px 12px;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="timeline">

        <h3 class="mb-4 text-center">
            {{ student.FNAME }} {{ student.LNAME }} - Payment Timeline
        </h3>

        {% for inst in installments %}
        <div class="timeline-item">
            <h5>₹ {{ inst.amount }}</h5>
            <p>Date: {{ inst.payment_date }}</p>

            <a href="{% url 'generate_receipt' inst.id %}" class="receipt-btn">
                Download Receipt
            </a>
        </div>
        {% empty %}
        <p>No payments yet.</p>
        {% endfor %}

    </div>

</body>

</html>
